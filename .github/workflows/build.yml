name: build

# Full Release/x86 build, package and checksum. This is reproducible from the repo now that the
# in-game HUD patch source (EmperorHooks/InGameHudFix.cpp, Moro's widescreen patch) is committed.
# The dev machine uses a newer toolset (v145); the runner has VS2022, so we pass -PlatformToolset v143.
# Pinned to windows-2022 because that image ships the v143 toolset.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Check the version string is consistent across the repo
        shell: bash
        run: |
          launcher=$(grep -oE 'Emperor Reborn v[0-9]+\.[0-9]+' EmperorLauncher/EmperorLauncher.cpp | head -1 | grep -oE '[0-9]+\.[0-9]+')
          jsonld=$(grep -oE '"softwareVersion": *"[0-9]+\.[0-9]+"' index.md | head -1 | grep -oE '[0-9]+\.[0-9]+')
          readme=$(grep -oE 'EmperorReborn-v[0-9]+\.[0-9]+\.zip' readme.md | head -1 | grep -oE '[0-9]+\.[0-9]+')
          package=$(grep -oE '\$Version = "[0-9]+\.[0-9]+"' package.ps1 | head -1 | grep -oE '[0-9]+\.[0-9]+')
          echo "launcher=$launcher jsonld=$jsonld readme=$readme package=$package"
          for v in "$launcher" "$jsonld" "$readme" "$package"; do
            if [ -z "$v" ]; then echo "::error::a version string was not found"; exit 1; fi
          done
          if [ "$launcher" = "$jsonld" ] && [ "$jsonld" = "$readme" ] && [ "$readme" = "$package" ]; then
            echo "version $launcher is consistent"
          else
            echo "::error::version mismatch (launcher=$launcher jsonld=$jsonld readme=$readme package=$package)"
            exit 1
          fi

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build and package (Release/x86)
        shell: pwsh
        run: .\package.ps1 -Version ci -PlatformToolset v143

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: EmperorReborn-ci
          path: |
            dist/EmperorReborn-vci.zip
            dist/EmperorReborn-vci.zip.sha256
          if-no-files-found: error
