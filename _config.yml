title: "Emperor Reborn"
description: >-
  A launcher for Emperor: Battle for Dune on Windows 10 and 11. Real 16:9
  widescreen, fullscreen scaling, original resolutions, and multiplayer over
  direct IP or DDNS. Open source, MIT-0, forked from wheybags' patch.
theme: jekyll-theme-cayman
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
url: "https://azmawee.github.io"
baseurl: "/EmperorReborn"
author: azmawee
twitter:
  username: azmawee
  card: summary
lang: en_US

# Only the landing page and docs are served; build artifacts and notes are ignored.
exclude:
  - dist/
  - promo-drafts.md
  - RELEASE-NOTES-TEMPLATE.md
  - WIDESCREEN-NOTES.md
  - dev-notes/
  - package.ps1
  - "*.sln"
  - "*.vcxproj"
  - Detours-4.0.1/
